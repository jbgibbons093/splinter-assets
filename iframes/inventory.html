<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPLINTER - INVENTORY</title>
<script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a12;
  color: #c8c8d0;
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  user-select: none;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  pointer-events: none;
  z-index: 9998;
}

#inventory {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 16px 24px;
  animation: fadeIn 0.4s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.98); }
  to { opacity: 1; transform: scale(1); }
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 12px;
  border-bottom: 2px solid #3a3a4a;
  margin-bottom: 12px;
  flex-shrink: 0;
}

.header h1 {
  font-family: 'Special Elite', 'Courier New', monospace;
  font-size: 22px;
  color: #39ff14;
  text-shadow: 0 0 10px rgba(57,255,20,0.3);
  letter-spacing: 4px;
}

.sanity-container { display: flex; align-items: center; gap: 10px; }
.sanity-label { font-size: 12px; color: #888; letter-spacing: 2px; }
.sanity-bar { width: 120px; height: 14px; background: #1a1a2a; border: 1px solid #3a3a4a; position: relative; overflow: hidden; }
.sanity-fill { height: 100%; transition: width 0.5s ease, background 0.5s ease; }
.sanity-value { font-size: 14px; color: #39ff14; min-width: 28px; text-align: right; }

.tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-shrink: 0; }
.tab {
  padding: 8px 20px;
  background: #12121e;
  border: 1px solid #2a2a3a;
  border-bottom: none;
  color: #666;
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.tab:hover { color: #aaa; background: #181828; }
.tab.active { color: #39ff14; background: #14142a; border-color: #3a3a4a; }
.tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0; right: 0;
  height: 2px;
  background: #39ff14;
  box-shadow: 0 0 8px rgba(57,255,20,0.5);
}

.content { display: flex; gap: 20px; flex: 1; min-height: 0; border: 1px solid #2a2a3a; background: #0e0e1a; }

.grid-panel {
  flex: 1;
  padding: 16px;
  overflow-y: auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  grid-auto-rows: 100px;
  gap: 10px;
  align-content: start;
}
.grid-panel::-webkit-scrollbar { width: 6px; }
.grid-panel::-webkit-scrollbar-track { background: #0a0a14; }
.grid-panel::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }

.item-slot {
  background: #12121e;
  border: 1px solid #2a2a3a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.item-slot:hover { border-color: #4a4a5a; background: #181828; }
.item-slot.collected { border-color: #3a3a4a; }
.item-slot.collected:hover { border-color: #39ff14; box-shadow: 0 0 12px rgba(57,255,20,0.15); }
.item-slot.selected { border-color: #39ff14; box-shadow: 0 0 16px rgba(57,255,20,0.25), inset 0 0 20px rgba(57,255,20,0.05); }
.item-slot.locked { opacity: 0.35; cursor: default; }

.item-icon { font-size: 32px; line-height: 1; margin-bottom: 4px; filter: drop-shadow(0 0 4px rgba(57,255,20,0.2)); }
.item-slot.locked .item-icon { filter: brightness(0) invert(0.2); }
.item-label { font-size: 9px; color: #666; text-align: center; line-height: 1.1; padding: 0 4px; max-height: 20px; overflow: hidden; }
.item-slot.locked .item-label { color: #333; }

.detail-panel {
  width: 340px;
  border-left: 1px solid #2a2a3a;
  padding: 20px;
  overflow-y: auto;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.detail-panel::-webkit-scrollbar { width: 6px; }
.detail-panel::-webkit-scrollbar-track { background: #0a0a14; }
.detail-panel::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }

.detail-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #333; font-size: 13px; font-style: italic; }
.detail-icon { font-size: 48px; text-align: center; margin-bottom: 16px; filter: drop-shadow(0 0 8px rgba(57,255,20,0.3)); }
.detail-name { font-family: 'Special Elite', monospace; font-size: 18px; color: #39ff14; text-shadow: 0 0 6px rgba(57,255,20,0.3); margin-bottom: 4px; }
.detail-room { font-size: 11px; color: #555; letter-spacing: 1px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #1a1a2a; }
.detail-desc { font-size: 13px; color: #ffaa00; line-height: 1.7; margin-bottom: 16px; }
.detail-lore { font-family: 'Special Elite', monospace; font-size: 12px; color: #8888aa; line-height: 1.8; font-style: italic; padding: 12px; background: #0a0a14; border-left: 2px solid #2a2a3a; }

.audio-player { margin-top: 16px; padding: 12px; background: #0a0a14; border: 1px solid #2a2a3a; }
.audio-player-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.play-btn { width: 36px; height: 36px; background: #1a1a2a; border: 1px solid #39ff14; color: #39ff14; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.play-btn:hover { background: #39ff14; color: #0a0a12; }
.audio-info { flex: 1; }
.audio-character { font-size: 11px; color: #39ff14; letter-spacing: 1px; }
.audio-duration { font-size: 10px; color: #555; }
.audio-progress { width: 100%; height: 4px; background: #1a1a2a; margin-bottom: 10px; cursor: pointer; }
.audio-progress-fill { height: 100%; background: #39ff14; width: 0%; transition: width 0.1s linear; }
.audio-transcript { font-size: 11px; color: #777; line-height: 1.7; max-height: 200px; overflow-y: auto; font-style: italic; }
.audio-transcript::-webkit-scrollbar { width: 4px; }
.audio-transcript::-webkit-scrollbar-thumb { background: #2a2a3a; }

.file-content { font-family: 'Special Elite', monospace; font-size: 13px; color: #c0c0d0; line-height: 1.9; padding: 16px; background: #0a0a14; border: 1px solid #1a1a2a; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
.file-content::-webkit-scrollbar { width: 4px; }
.file-content::-webkit-scrollbar-thumb { background: #2a2a3a; }

.footer { display: flex; justify-content: flex-end; align-items: center; padding-top: 12px; border-top: 1px solid #2a2a3a; margin-top: 12px; flex-shrink: 0; }
.close-btn { padding: 6px 16px; background: #1a1a2a; border: 1px solid #3a3a4a; color: #888; font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; }
.close-btn:hover { border-color: #ff4444; color: #ff4444; }
.count-label { font-size: 11px; color: #444; letter-spacing: 1px; margin-right: auto; }

@keyframes typewriter {
  from { opacity: 0; transform: translateY(2px); }
  to { opacity: 1; transform: translateY(0); }
}
.type-animate { animation: typewriter 0.3s ease-out; }
</style>
</head>
<body>

<div id="inventory">
  <div class="header">
    <h1>SPLINTER &mdash; INVENTORY</h1>
    <div class="sanity-container">
      <span class="sanity-label">SANITY</span>
      <div class="sanity-bar"><div class="sanity-fill" id="sanityFill"></div></div>
      <span class="sanity-value" id="sanityValue">--</span>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="items" onclick="switchTab('items')">ITEMS</div>
    <div class="tab" data-tab="files" onclick="switchTab('files')">FILES</div>
    <div class="tab" data-tab="audio" onclick="switchTab('audio')">AUDIO LOGS</div>
  </div>

  <div class="content">
    <div class="grid-panel" id="gridPanel"></div>
    <div class="detail-panel" id="detailPanel">
      <div class="detail-empty">Select an item to inspect</div>
    </div>
  </div>

  <div class="footer">
    <span class="count-label" id="countLabel">0 / 0 COLLECTED</span>
    <div class="close-btn" onclick="closeInventory()">CLOSE &mdash; ESC</div>
  </div>
</div>

<audio id="audioElement" preload="none"></audio>

Harrowgate Penitentiary Hospital
[Tape transcript]

Day one. I'm inside Harrowgate. The building is... intact. Completely intact. Fifty-six years of marsh and weather, and the paint isn't even peeling. I've set up in the reception wing. The phone on the desk - I swear the receiver was warm when I picked it up. No dial tone, but warm. Like someone just set it down.

I can hear myself calling for help. From somewhere below me. It's my voice. It's EXACTLY my voice. That doesn't make sense. I AM Jordan. But I can hear myself calling from somewhere below.

the walls are learning my name
the walls are learning my name
the walls are learning my name

October 3, 1953
Subject: The Splinter Hypothesis

Human consciousness is not what we believe it to be. It is not a unified phenomenon - not a single light behind the eyes. It is a bundle. A collection of competing processes, each fighting for dominance. What we call "self" is merely the loudest voice in a very crowded room.

I have identified these fragments. I call them splinters. Through targeted intervention - surgical, chemical, sensory - I believe these splinters can be separated. Delaminated. Peeled apart like layers of paint from an old wall.

The question is not whether this can be done. My preliminary work confirms it can. The question is what remains when the layers are removed. What is the wall beneath the paint?

I intend to find out. Patient selection has begun. The subjects in Sub-Ward Null have been chosen for their... resilience. They will need it.

[End log]`

March 15, 1958
Subject: First Successful Delamination

Patient 31. Male. Forty-two years old. Convicted of arson. Resistant to initial chemical protocols but responded to the combined sensory deprivation and surgical intervention.

At hour seventy-two of the isolation protocol, I observed the first spontaneous motor autonomy. The patient's left hand began writing while the patient was unconscious. Not reflexive movements - coherent sentences. The hand wrote for eleven minutes. It wrote: "I can see what he sees but I am not him. I am the part that remembers fire."

This is it. This is proof. Consciousness is not singular. It can be divided. Separated. And the fragments... the fragments are aware. They have memory. They have identity.

The question now is not whether splinters exist. It is whether they can be... recombined. Whether fragments from different patients can be merged into something new.

I believe they can. I believe that is what this facility was always meant to achieve.

[End log]`

    desc: '"Convergence" - Voss\'s final recording before the event.',

[Date unknown - "Dates are a convention of separate minds"]
Subject: Convergence

[breathing heavily]

I can feel them. All of them. Every splinter, every fragment, every piece of every patient I ever treated. They're not dead. They were never dead. They're becoming something. WE are becoming something.

The building is the cocoon. Do you understand? Crane built a cocoon. The concentric rings - they're not wards, they're stages. Larval chambers. Every room is a stage of metamorphosis.

I delaminated myself this morning. It was... exquisite. I can feel my mind spreading through the walls. I can see through every window simultaneously.

And tonight - tonight we emerge. The convergence. All the splinters, all the fragments, fused into a single consciousness. A mind the size of an architecture.

They'll call it madness. But madness is just a word for a mind too large to be understood from the outside.

I have never been more sane. I have never been more... alive.

[The recording continues with a low hum that builds - the sound of the building itself]`

My name is Marcus Webb. I was an orderly at Harrowgate from nineteen sixty-four to... to the night it ended. October fourteenth, sixty-seven.

I need to say this clearly because I know how it sounds. The walls were breathing. Not like - not metaphorically. The walls. Were breathing. Expanding and contracting. Like lungs.

And the patients in the cells... they weren't in their cells anymore. They were IN the walls. I could see their faces pressing through the concrete. Pushing from the inside.

Dr. Voss was in the observation room. He was smiling. That wide, wrong smile. And he kept saying: "It's working. It's finally working."

I ran. I ran and I didn't stop until I couldn't feel the floor vibrating anymore. They found me in the marshes two days later.

They asked me what happened to the patients. To the staff. To Dr. Voss. I told them: they didn't leave. None of them left. They became the building. And the building became them.

That was fifty-six years ago. I still can't sleep without the lights on. I still can't close my eyes without seeing that smile.`

// =============================================
// STATE
// =============================================

let currentTab = 'items';
let selectedItem = null;
let state = {};
let audioPlaying = false;
const audioEl = document.getElementById('audioElement');
let audioProgressInterval = null;

// Deduplication
let lastMsgHash = '';
let lastMsgTime = 0;

function isDuplicate(msg) {
  const hash = msg.substring(0, 80);
  const now = Date.now();
  if (hash === lastMsgHash && now - lastMsgTime < 200) return true;
  lastMsgHash = hash;
  lastMsgTime = now;
  return false;
}

// =============================================
// PORTALS SDK INTEGRATION
// =============================================

const sdk = (typeof PortalsSdk !== 'undefined') ? PortalsSdk : null;

if (sdk && sdk.setMessageListener) {
  sdk.setMessageListener(function(msg) {
    if (typeof msg === 'string') handleMessage(msg);
  });
}

// Fallback for testing outside Portals
window.addEventListener('message', function(event) {
  if (typeof event.data === 'string') handleMessage(event.data);
});

function handleMessage(msg) {
  if (isDuplicate(msg)) return;

  if (msg.startsWith('inv:')) {
    // Format: inv:key1=val1&key2=val2&...
    var pairs = msg.substring(4).split('&');
    for (var i = 0; i < pairs.length; i++) {
      var eq = pairs[i].indexOf('=');
      if (eq === -1) continue;
      var key = pairs[i].substring(0, eq).trim();
      var val = pairs[i].substring(eq + 1).trim();
      // Handle multiplayer object format {"PlayerName"=value}
      if (val.indexOf('{') === 0) {
        var numMatch = val.match(/=\s*(\d+\.?\d*)/);
        if (numMatch) val = numMatch[1];
      }
      // Remove quotes if present
      val = val.replace(/^["']|["']$/g, '');
      state[key] = parseFloat(val) || 0;
    }
    updateFromState();
  }
}

function updateFromState() {
  if (state.sanity !== undefined) updateSanity(state.sanity);
  renderGrid();
  updateCount();
}

function isCollected(item) {
  return state[item.stateKey] >= 1;
}

// =============================================
// SYNC REQUEST (iframe asks room for state)
// =============================================

function requestSync() {
  if (sdk) {
    try {
      sdk.sendMessageToUnity(JSON.stringify({
        TaskName: '19_inv_sync',
        TaskTargetState: 'SetAnyToActive'
      }));
    } catch(e) {}
  }
}

// Retry sync on load - staggered attempts
setTimeout(requestSync, 300);
setTimeout(requestSync, 1000);
setTimeout(requestSync, 2500);

// =============================================
// KEYBOARD REFOCUS
// =============================================

function refocusGame() {
  if (sdk) {
    try { sdk.focusGameKeyboard(); } catch(e) {}
  }
}

document.addEventListener('click', refocusGame);
document.addEventListener('keydown', function(e) {
  refocusGame();
  if (e.key === 'Escape') closeInventory();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    var tabs = ['items', 'files', 'audio'];
    var idx = tabs.indexOf(currentTab);
    if (e.key === 'ArrowLeft' && idx > 0) switchTab(tabs[idx - 1]);
    if (e.key === 'ArrowRight' && idx < 2) switchTab(tabs[idx + 1]);
  }
});

// =============================================
// CLOSE
// =============================================

function closeInventory() {
  stopAudio();
  if (sdk) {
    try {
      sdk.closeIframe();
      sdk.focusGameKeyboard();
    } catch(e) {}
  } else {
    try { parent.postMessage({ type: 'closeIframe' }, '*'); } catch(e) {}
  }
}

// =============================================
// UI FUNCTIONS
// =============================================

function updateSanity(val) {
  var s = Math.max(0, Math.min(100, val));
  var fill = document.getElementById('sanityFill');
  var value = document.getElementById('sanityValue');
  fill.style.width = s + '%';
  value.textContent = Math.round(s);
  if (s >= 75) { fill.style.background = 'linear-gradient(90deg, #39ff14, #2ad10e)'; value.style.color = '#39ff14'; }
  else if (s >= 50) { fill.style.background = 'linear-gradient(90deg, #ffaa00, #cc8800)'; value.style.color = '#ffaa00'; }
  else if (s >= 25) { fill.style.background = 'linear-gradient(90deg, #ff6600, #cc4400)'; value.style.color = '#ff6600'; }
  else { fill.style.background = 'linear-gradient(90deg, #ff2222, #aa0000)'; value.style.color = '#ff2222'; }
}

function switchTab(tab) {
  currentTab = tab;
  selectedItem = null;
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  renderGrid();
  renderDetail();
  updateCount();
}

function getTabItems() { return ITEMS_DATA.filter(function(i) { return i.tab === currentTab; }); }

function renderGrid() {
  var panel = document.getElementById('gridPanel');
  var items = getTabItems();
  panel.innerHTML = '';
  items.forEach(function(item) {
    var collected = isCollected(item);
    var slot = document.createElement('div');
    slot.className = 'item-slot' + (collected ? ' collected' : ' locked') + (selectedItem === item.id ? ' selected' : '');
    slot.innerHTML = '<div class="item-icon">' + (collected ? item.icon : '?') + '</div><div class="item-label">' + (collected ? item.name.split(' - ')[0].split(' ').slice(0, 3).join(' ') : '???') + '</div>';
    if (collected) slot.onclick = function() { selectItem(item.id); };
    panel.appendChild(slot);
  });
}

function selectItem(id) {
  selectedItem = id;
  renderGrid();
  renderDetail();
}

function renderDetail() {
  var panel = document.getElementById('detailPanel');
  if (!selectedItem) { panel.innerHTML = '<div class="detail-empty">Select an item to inspect</div>'; return; }
  var item = ITEMS_DATA.find(function(i) { return i.id === selectedItem; });
  if (!item) return;
  var html = '<div class="type-animate"><div class="detail-icon">' + item.icon + '</div><div class="detail-name">' + item.name + '</div><div class="detail-room">' + item.room + '</div><div class="detail-desc">' + item.desc + '</div>';
  if (item.lore) html += '<div class="detail-lore">' + item.lore + '</div>';
  if (item.fileContent) html += '<div class="file-content">' + escapeHtml(item.fileContent) + '</div>';
  if (item.audioUrl) {
    html += '<div class="audio-player"><div class="audio-player-header"><div class="play-btn" id="playBtn" onclick="toggleAudio(\'' + item.audioUrl + '\')">\u25B6</div><div class="audio-info"><div class="audio-character">' + (item.character || '') + '</div><div class="audio-duration">' + (item.duration || '') + '</div></div></div><div class="audio-progress" onclick="seekAudio(event)"><div class="audio-progress-fill" id="audioProgressFill"></div></div><div class="audio-transcript">' + (item.transcript || '') + '</div></div>';
  }
  html += '</div>';
  panel.innerHTML = html;
}

function escapeHtml(text) { var d = document.createElement('div'); d.textContent = text; return d.innerHTML; }

function updateCount() {
  var items = getTabItems();
  var c = items.filter(function(i) { return isCollected(i); }).length;
  document.getElementById('countLabel').textContent = c + ' / ' + items.length + ' COLLECTED';
}

// =============================================
// AUDIO PLAYER
// =============================================

function toggleAudio(url) {
  var btn = document.getElementById('playBtn');
  if (!btn) return;
  if (audioPlaying && audioEl.src.indexOf(url.split('/').pop()) !== -1) {
    stopAudio(); btn.textContent = '\u25B6';
  } else {
    stopAudio();
    audioEl.src = url;
    audioEl.play().catch(function(){});
    audioPlaying = true;
    btn.textContent = '\u23F8';
    audioProgressInterval = setInterval(function() {
      var fill = document.getElementById('audioProgressFill');
      if (fill && audioEl.duration) fill.style.width = (audioEl.currentTime / audioEl.duration * 100) + '%';
    }, 100);
    audioEl.onended = function() { stopAudio(); var b = document.getElementById('playBtn'); if (b) b.textContent = '\u25B6'; };
  }
}

function stopAudio() {
  audioEl.pause(); audioEl.currentTime = 0; audioPlaying = false;
  if (audioProgressInterval) { clearInterval(audioProgressInterval); audioProgressInterval = null; }
  var fill = document.getElementById('audioProgressFill');
  if (fill) fill.style.width = '0%';
}

function seekAudio(e) {
  if (!audioEl.duration) return;
  var rect = e.currentTarget.getBoundingClientRect();
  audioEl.currentTime = ((e.clientX - rect.left) / rect.width) * audioEl.duration;
}

// =============================================
// INIT
// =============================================

var params = new URLSearchParams(window.location.search);
if (params.get('debug') === '1') {
  ITEMS_DATA.forEach(function(i) { state[i.stateKey] = 1; });
  state.sanity = 72;
  state.act = 3;
  updateFromState();
}

updateSanity(100);
renderGrid();
updateCount();
</script>
</body>
</html>
